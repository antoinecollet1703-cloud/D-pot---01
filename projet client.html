<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>À propos de moi</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f0f2f7;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .outer {
      max-width: 720px;
      width: 100%;
      padding: 1rem;
    }

    /* Bouton violet hors carte, aligné à droite */
    .btn-row {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 12px;
    }

    .btn-contact {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px;
      background: #7c5cbf;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-contact:hover { background: #6647aa; }
    .btn-contact:active { transform: scale(0.98); }

    /* Carte principale */
    .card-wrapper {
      display: flex;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #e0e3eb;
      min-height: 340px;
      background: #fff;
    }

    /* Panneau gauche (photo) */
    .photo-panel {
      width: 42%;
      background: #fff;
      border-right: 1px solid #e0e3eb;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 2rem;
    }

    .photo-frame {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 1.5px dashed #c0c5d0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #c0c5d0;
      font-size: 36px;
    }

    .photo-caption { font-size: 12px; color: #aaa; }

    /* Panneau droit (texte) */
    .text-panel {
      width: 58%;
      padding: 2.5rem 2rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 12px;
      background: #fff;
    }

    .panel-title { font-size: 26px; font-weight: 500; color: #1a2340; }
    .title-underline { width: 48px; height: 3px; background: #3a7bd5; border-radius: 2px; }
    .panel-body { font-size: 15px; color: #555; line-height: 1.7; }

    /* Encadré infos */
    .info-block {
      border: 1px solid #e0e3eb;
      border-radius: 8px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .info-row { display: flex; gap: 10px; align-items: center; font-size: 14px; color: #555; }
    .info-label { font-weight: 500; color: #1a2340; min-width: 80px; }
  </style>
</head>
<body>

  <div class="outer">

    <!-- Bouton hors carte -->
    <div class="btn-row">
      <button class="btn-contact">✉ Me contacter</button>
    </div>

    <!-- Carte -->
    <div class="card-wrapper">

      <div class="photo-panel">
        <div class="photo-frame">👤</div>
        <p class="photo-caption">[ Cadre Photo ]</p>
      </div>

      <div class="text-panel">
        <h1 class="panel-title">À propos de moi</h1>
        <div class="title-underline"></div>
        <p class="panel-body">Bonjour, voici ma page de présentation. Ajoutez ici un texte décrivant votre parcours, vos passions ou vos compétences.</p>

        <div class="info-block">
          <div class="info-row">
            <span>📍</span><span class="info-label">Ville :</span><span>Paris, France</span>
          </div>
          <div class="info-row">
            <span>💼</span><span class="info-label">Métier :</span><span>Développeur web</span>
          </div>
          <div class="info-row">
            <span>✉️</span><span class="info-label">Email :</span>
            <span style="color:#3a7bd5;">contact@monsite.fr</span>
          </div>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
