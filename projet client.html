!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qui sommes-nous ?</title>
    <style>
        /* Styles globaux et remise à zéro */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Conteneur principal de la présentation */
        .presentation-container {
            display: flex;
            background-color: #ffffff;
            max-width: 900px;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        }

        /* Section Gauche : La Photo */
        .photo-side {
            flex: 1;
            background-color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 400px;
            position: relative;
        }

        /* L'image elle-même */
        .photo-side img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Permet à l'image de bien remplir l'espace sans se déformer */
        }

        /* Emplacement réservé (si pas d'image) */
        .placeholder-text {
            color: #64748b;
            font-weight: 600;
            text-align: center;
            padding: 20px;
        }

        /* Section Droite : Le Texte */
        .text-side {
            flex: 1.2; /* Donne un peu plus d'espace au texte qu'à la photo */
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .text-side h1 {
            font-size: 2rem;
            color: #1e293b;
            margin-bottom: 20px;
            position: relative;
        }

        /* Petite ligne décorative sous le titre */
        .text-side h1::after {
            content: '';
            display: block;
            width: 60px;
            height: 4px;
            background-color: #3b82f6; /* Couleur bleue */
            border-radius: 2px;
            margin-top: 8px;
        }

        .text-side p {
            font-size: 1.05rem;
            color: #475569;
            margin-bottom: 15px;
        }

        /* Adaptabilité pour les écrans de smartphones */
        @media (max-width: 768px) {
            .presentation-container {
                flex-direction: column; /* Aligne la photo et le texte verticalement */
            }

            .photo-side {
                min-height: 250px;
            }

            .text-side {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="presentation-container">
        
        <!-- CÔTÉ GAUCHE : LA PHOTO -->
        <div class="photo-side">
            <!-- 
              Remplacez "votre-photo.jpg" par le lien ou le nom réel de votre image.
              Si l'image n'est pas trouvée, le texte "Emplacement Photo" s'affichera à la place.
            -->
            <img src="votre-photo.jpg" alt="Emplacement Photo" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <div class="placeholder-text" style="display: none;">[ Cadre Photo ]</div>
        </div>

        <!-- CÔTÉ DROIT : LE TEXTE -->
        <div class="text-side">
            <h1>À propos de moi</h1>
            <p>Bonjour voici ma page de présentation</p>
        </div>

    </div>

</body>
</html>
